spring:
  application:
    name: satellite-tracker

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sattrack}
    username: ${DB_USER:sattrack}
    password: ${DB_PASSWORD:sattrack_secret_change_in_prod}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 50
        jdbc:
          batch_size: 50

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  cache:
    type: caffeine

server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,text/html
    min-response-size: 1024
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

app:
  security:
    jwt:
      secret: ${JWT_SECRET:CHANGE_THIS_IN_PRODUCTION_USE_256_BIT_KEY_AT_MINIMUM_32_CHARS}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# ===============================
# 🔐 SPACE-TRACK (NEW)
# ===============================
space-track:
  username: ${SPACE_TRACK_USERNAME}
  password: ${SPACE_TRACK_PASSWORD}

resilience4j:
  ratelimiter:
    instances:
      default:
        limit-for-period: 60
        limit-refresh-period: 1m
        timeout-duration: 0s
      position:
        limit-for-period: 120
        limit-refresh-period: 1m
        timeout-duration: 0s
      track:
        limit-for-period: 20
        limit-refresh-period: 1m
        timeout-duration: 0s

logging:
  level:
    root: INFO
    com.sattrack: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"