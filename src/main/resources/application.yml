spring:
  application:
    name: satellite-tracker

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sattrack}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 50
        jdbc:
          batch_size: 50

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sattrack}
    user: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}


  # TASK EXECUTION / SCHEDULING

  task:
    scheduling:
      pool:
        size: 4
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 100

  # EMAIL (SMTP)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USER}
    password: ${MAIL_PASS}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # CACHING
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s

server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,text/html
    min-response-size: 1024
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# APP-SPECIFIC MAIL SETTINGS
sattrack:
  mail:
    from: ${MAIL_USER}
    base-url: https://sattrack.app


# OREKIT DATA
orekit:
  data:
    path: orekit-data


# TLE PROVIDERS

space-track:
  username: ${SPACE_TRACK_USERNAME:}
  password: ${SPACE_TRACK_PASSWORD:}

n2yo:
  api-key: ${N2YO_API_KEY:}


# RATE LIMITING

resilience4j:
  ratelimiter:
    instances:
      default:
        limit-for-period: 300
        limit-refresh-period: 1m
        timeout-duration: 0s
      position:
        limit-for-period: 600
        limit-refresh-period: 1m
        timeout-duration: 0s
      track:
        limit-for-period: 200
        limit-refresh-period: 1m
        timeout-duration: 0s

# LOGGING
logging:
  level:
    root: INFO
    com.sattrack: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    io.github.resilience4j: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"